<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FunaRoute PWA</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html, body { margin:0; height:100%; font-family: Arial; }
#mapFrame { width:100%; height: calc(100vh - 200px); border:0; }
</style>
</head>

<body class="bg-gray-100">

<header class="bg-blue-600 text-white p-4 text-center">
    <h1 class="text-lg font-bold">📍 FunaRoute</h1>
</header>

<div class="p-4 bg-white space-y-3">

<select id="houseSelect" class="w-full p-3 border rounded-xl">
<option value="">-- Select House --</option>
</select>

<button onclick="getLocation()"
class="w-full bg-blue-600 text-white p-3 rounded-xl">
📍 My Location
</button>

<div id="info" class="text-sm bg-gray-100 p-3 rounded-xl">
Loading...
</div>

</div>

<iframe id="mapFrame"></iframe>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-6SZCJZROkTKqOuFkFPXMTUH_IGeRzalgMJUZCvcoNpfl4XIcwM7WdBZNkNDW7QqR0Q/exec";

let API_KEY = "";
let userLocation = null;

const houses = [
{name:"Maafolheyge", lat:6.151617219632103, lng:73.28952670775449},
{name:"Malas", lat:6.152929873362177, lng:73.28939657864927},
{name:"Gulshan", lat:6.154929429854813, lng:73.28872306036415},
{name:"Vaijeheyge", lat:6.153147495719548, lng:73.28853916184097},
{name:"Maaolhu", lat:6.15201080390234, lng:73.28894463956169},
{name:"Kurikeelage", lat:6.151088944081502, lng:73.28896133726448},
{name:"Feeroazuge", lat:6.150456919931062, lng:73.28891331235067},
{name:"Vilu", lat:6.14392570903557, lng:73.29086765615183},
{name:"Even", lat:6.142170500493604, lng:73.29150036111825},
{name:"Aavehi", lat:6.148863510016758, lng:73.29115014730162}
];

// load API key
async function loadKey() {

    const res = await fetch(SCRIPT_URL);
    const data = await res.json();

    API_KEY = data.key;

    document.getElementById("info").innerText =
    "Ready ✔";

}

// dropdown
const select = document.getElementById("houseSelect");

houses.forEach((h,i)=>{
    let o = document.createElement("option");
    o.value=i;
    o.textContent=h.name;
    select.appendChild(o);
});

select.addEventListener("change", updateMap);

// location
function getLocation() {

    navigator.geolocation.getCurrentPosition(pos => {

        userLocation = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
        };

        updateMap();

    });

}

// update map
function updateMap() {

    const idx = select.value;

    if (!userLocation || idx==="") return;

    const dest = houses[idx];

    const url =
`https://www.google.com/maps/embed/v1/directions?key=${API_KEY}
&origin=${userLocation.lat},${userLocation.lng}
&destination=${dest.lat},${dest.lng}
&mode=walking&maptype=satellite`;

    document.getElementById("mapFrame").src = url;

}

loadKey();

</script>

</body>
</html>
